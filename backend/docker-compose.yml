secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  secret_key:
    file: ./secrets/secret_key.txt
  smtp_password:
    file: ./secrets/smtp_password.txt
  grafana_password:
    file: ./secrets/grafana_password.txt
  pgadmin_password:
    file: ./secrets/pgadmin_password.txt
  influxdb_password:
    file: ./secrets/influxdb_password.txt

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: hse-postgres
    environment:
      POSTGRES_DB: hse_edw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql/hse_edw_setup.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: hse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hse-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/hse_edw
      - REDIS_URL=redis://redis:6379/0
      - REDIS_ENABLED=true
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-use-strong-secret}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - ALERT_EMAIL_ENABLED=true
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - ALERT_FROM_EMAIL=${ALERT_FROM_EMAIL:-}
    secrets:
      - secret_key
      - smtp_password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./logs:/app/logs
      - ./evidence:/app/evidence
    restart: unless-stopped
    profiles:
      - app

  # Celery Worker
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hse-celery
    command: celery -A app.utils.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/hse_edw
      - REDIS_URL=redis://redis:6379/0
      - REDIS_ENABLED=true
    secrets:
      - secret_key
      - smtp_password
    depends_on:
      - postgres
      - redis
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    profiles:
      - app

  # Celery Beat (scheduler for periodic tasks like alert evaluation)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hse-celery-beat
    command: celery -A app.utils.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/hse_edw
      - REDIS_URL=redis://redis:6379/0
      - REDIS_ENABLED=true
    secrets:
      - secret_key
      - smtp_password
    depends_on:
      - postgres
      - redis
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    profiles:
      - app

  # PgAdmin (Database management UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hse-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@hse.local}
      PGADMIN_DEFAULT_PASSWORD_FILE: /run/secrets/pgadmin_password
      PGADMIN_LISTEN_PORT: 80
    secrets:
      - pgadmin_password
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    profiles:
      - tools
    restart: unless-stopped

  # Nginx (Reverse proxy for API + Dashboard)
  nginx:
    image: nginx:alpine
    container_name: hse-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../dashboard:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: unless-stopped
    profiles:
      - proxy

  # PostgreSQL Backup Service
  postgres-backup:
    image: postgres:15-alpine
    container_name: hse-postgres-backup
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: hse_edw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: 30
    secrets:
      - postgres_password
    volumes:
      - postgres_backup_data:/backups
    command: >
      sh -c "
        echo 'Starting PostgreSQL backup service...' &&
        echo '0 2 * * * /scripts/backup.sh >> /var/log/backup.log 2>&1' > /etc/crontabs/root &&
        crond -f -l 8
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - backup

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
  grafana_data:
    driver: local
  influxdb_data:
    driver: local
  prometheus_data:
    driver: local
  loki_data:
    driver: local
  tempo_data:
    driver: local
  postgres_backup_data:
    driver: local
