<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HSE Dashboard — Site Alpha</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{--bg:#f4f6f8;--card:#ffffff;--tx:#1f2937;--tx2:#6b7280;--g:#2e7d32;--g-bg:#e8f5e9;--a:#f57c00;--a-bg:#fff3e0;--r:#c62828;--r-bg:#ffebee;--b:#2196f3;--p:#9c27b0;--t:#009688;--br:#e5e7eb}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--tx);font-family:Segoe UI,Roboto,system-ui,sans-serif}
  .grid1{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;padding:16px 20px}
  .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;padding:0 20px 16px}
  .card{background:var(--card);border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--br)}
  .kpi{position:relative;border-left:4px solid var(--tx2)}.kpi.g{border-left-color:var(--g)}.kpi.r{border-left-color:var(--r)}
  .kpi .label{font-size:11px;color:var(--tx2);font-weight:700;text-transform:uppercase;margin-bottom:4px}
  .kpi .val{font-size:26px;font-weight:700;color:var(--tx)}
  .loading-state,.empty-state,.error-state{text-align:center;padding:40px;color:var(--tx2)}
  .error-state{color:#dc2626}
  .module-view{display:none}.module-view.on{display:block}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .toolbar,.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px}
  .btn-primary{background:#2e7d32;color:#fff}.btn-secondary{background:#e5e7eb;color:#1f2937}
  .form-container{max-width:900px;margin:0 auto}
  .form-section{margin-bottom:24px;padding:16px;background:#f8fafc;border-radius:8px}
  .form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:12px}
  .form-group{display:flex;flex-direction:column}
  .form-group label{font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:4px}
  .form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1px solid var(--br);border-radius:6px;font-size:13px}
  .form-group textarea{min-height:80px;resize:vertical}
  .form-group.full-width{grid-column:1 / -1}
  .login-view{display:flex;position:fixed;inset:0;background:#0f172a;align-items:center;justify-content:center}
  .login-box{background:#fff;padding:40px;border-radius:12px;width:100%;max-width:400px}
  .app-view{display:none}.app-header{background:#0f172a;color:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
  .app-header h1{margin:0;font-size:18px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{background:#f8fafc;padding:8px;border-bottom:2px solid var(--br)}
  td{padding:8px;border-bottom:1px solid #f1f5f9}
  .pagination{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:16px}
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:1000}
  .modal.on{display:flex}
  .modal-content{background:#fff;padding:24px;border-radius:12px;width:90%;max-width:500px}
</style>
</head>
<body>
<div id="login-view" class="login-view">
  <div class="login-box">
    <h2>HSE Dashboard Login</h2>
    <div id="login-error" class="error-state" style="display:none"></div>
    <form id="login-form">
      <div class="form-group"><label>Email</label><input type="email" id="login-email" value="super.admin@company.com" required /></div>
      <div class="form-group"><label>Password</label><input type="password" id="login-password" value="Welcome123!" required /></div>
      <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
    </form>
  </div>
</div>
<div id="app-view" class="app-view">
  <div class="app-header">
    <div><h1>HSE Dashboard — Site Alpha</h1><div style="font-size:12px;opacity:.8">SMKP Minerba · ISO 45001</div></div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div id="dynamic-menu"></div>
      <div class="clock" id="clock"></div>
      <span id="current-user" style="font-size:12px"></span>
      <button onclick="HSEApp.logout()" style="padding:6px 12px;background:#dc2626;color:#fff;border:none;border-radius:6px;cursor:pointer">Logout</button>
    </div>
  </div>
  <div class="filters"><div><label>Site:</label><select id="site-filter"><option value="all">All Sites</option></select></div><div><label>Periode:</label><select id="period-filter"><option value="7">7 Hari</option><option value="30" selected>30 Hari</option></select></div></div>
  <div id="alerts"></div>
  <div class="grid1" id="execKpi"></div>
  <div class="grid2"><canvas id="chartTrend"></canvas><canvas id="chartMix"></canvas></div>

  <div id="view-incidents-dashboard" class="module-view"><div id="incident-dashboard-content"></div></div>
  <div id="view-incidents-list" class="module-view"><div id="incident-list-content"></div></div>
  <div id="view-incidents-add" class="module-view"><div id="incident-form-container"></div></div>
  <div id="view-incidents-detail" class="module-view"><div id="incident-detail-container"></div></div>

  <div id="view-ptw-dashboard" class="module-view"><div id="ptw-dashboard-content"></div></div>
  <div id="view-ptw-list" class="module-view"><div id="ptw-list-content"></div></div>
  <div id="view-ptw-detail" class="module-view"><div id="ptw-detail-container"></div></div>

  <div id="view-training-dashboard" class="module-view"><div id="training-dashboard-content"></div></div>
  <div id="view-training-list" class="module-view"><div id="training-list-content"></div></div>
  <div id="view-training-add" class="module-view"><div id="training-detail-container"></div></div>

  <div id="view-near-miss-dashboard" class="module-view"><div id="near-miss-dashboard-content"></div></div>
  <div id="view-near-miss-list" class="module-view"><div id="near-miss-list-content"></div></div>
  <div id="view-near-miss-detail" class="module-view"><div id="near-miss-detail-container"></div></div>

  <div id="view-observations-dashboard" class="module-view"><div id="observation-dashboard-content"></div></div>
  <div id="view-observations-list" class="module-view"><div id="observation-list-content"></div></div>
  <div id="view-observations-detail" class="module-view"><div id="observation-detail-container"></div></div>

  <div id="view-equipment-dashboard" class="module-view"><div id="equipment-dashboard-content"></div></div>
  <div id="view-equipment-list" class="module-view"><div id="equipment-list-content"></div></div>
  <div id="view-equipment-detail" class="module-view"><div id="equipment-detail-container"></div></div>

  <div id="view-hira-list" class="module-view"><div id="hira-list-content"></div></div>
  <div id="view-hira-detail" class="module-view"><div id="hira-detail-container"></div></div>

  <div id="view-contractors-list" class="module-view"><div id="contractor-list-content"></div></div>
  <div id="view-contractors-detail" class="module-view"><div id="contractor-detail-container"></div></div>

  <div style="text-align:center;padding:16px;font-size:11px;color:#9ca3af">HSE Dashboard v2.0</div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/store.js"></script>
<script src="js/form-helper.js"></script>
<script src="js/modules/dashboard.js"></script>
<script src="js/modules/incident.js"></script>
<script src="js/modules/ptw.js"></script>
<script src="js/modules/training.js"></script>
<script src="js/modules/near-miss.js"></script>
<script src="js/modules/observation.js"></script>
<script src="js/modules/equipment.js"></script>
<script src="js/modules/hira.js"></script>
<script src="js/modules/contractor.js"></script>
<script src="js/app.js"></script>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');
  try {
    const result = await Auth.login(email, password);
    if (result) window.location.reload();
    else { errorEl.textContent = 'Login failed'; errorEl.style.display = 'block'; }
  } catch (error) {
    errorEl.textContent = error.message || 'Login failed';
    errorEl.style.display = 'block';
  }
});
</script>
</body>
</html>
